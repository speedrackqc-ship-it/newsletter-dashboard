<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#1F1B17" />
<title>오늘의 뉴스레터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=IBM+Plex+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F4ED;
    --bg-elev: #FFFFFF;
    --ink: #1F1B17;
    --ink-soft: #5A544A;
    --ink-muted: #8B857B;
    --rule: rgba(31, 27, 23, 0.12);
    --rule-soft: rgba(31, 27, 23, 0.06);
    --accent: #A23E3E;
    --accent-bg: rgba(162, 62, 62, 0.08);
    --serif: "Gowun Batang", "Noto Serif KR", "Times New Roman", serif;
    --sans: "IBM Plex Sans KR", "Pretendard", -apple-system, "Apple SD Gothic Neo", sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1A1714; --bg-elev: #232019; --ink: #ECE7DC; --ink-soft: #B5AE9F;
      --ink-muted: #7F786C; --rule: rgba(236, 231, 220, 0.12); --rule-soft: rgba(236, 231, 220, 0.05);
      --accent: #D87878; --accent-bg: rgba(216, 120, 120, 0.1);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); font-family: var(--sans); line-height: 1.6; min-height: 100vh; padding: 24px 20px 80px; }
  .container { max-width: 720px; margin: 0 auto; }
  header { padding: 24px 0 32px; border-bottom: 1px solid var(--rule); margin-bottom: 28px; }
  .masthead { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 24px; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-muted); font-weight: 500; }
  .date-block { font-family: var(--serif); margin-bottom: 14px; }
  .date-num { font-size: clamp(46px, 12vw, 72px); line-height: 0.95; letter-spacing: -0.02em; }
  .date-meta { margin-top: 8px; display: flex; gap: 14px; font-size: 13px; color: var(--ink-soft); }
  .date-meta strong { color: var(--accent); font-weight: 500; }
  .stats { display: flex; gap: 24px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--rule-soft); }
  .stat { flex: 1; }
  .stat-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 4px; }
  .stat-value { font-family: var(--serif); font-size: 28px; line-height: 1; }
  .filters { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 28px; scrollbar-width: none; }
  .filters::-webkit-scrollbar { display: none; }
  .pill { flex-shrink: 0; padding: 7px 14px; border: 1px solid var(--rule); border-radius: 999px; background: transparent; color: var(--ink-soft); font-family: var(--sans); font-size: 12.5px; cursor: pointer; white-space: nowrap; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
  .pill:hover { color: var(--ink); border-color: var(--ink-soft); }
  .pill.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .pill-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .date-section { margin-bottom: 36px; }
  .date-divider { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
  .date-divider-text { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-muted); font-weight: 500; }
  .date-divider-line { flex: 1; height: 1px; background: var(--rule); }
  .card { padding: 22px 0; border-bottom: 1px solid var(--rule-soft); cursor: pointer; transition: opacity 0.2s; }
  .card:hover .card-subject { color: var(--accent); }
  .card.read { opacity: 0.55; }
  .card-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 12px; color: var(--ink-muted); }
  .nl-badge { display: inline-flex; align-items: center; gap: 6px; color: var(--ink-soft); font-weight: 500; }
  .nl-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .meta-sep { color: var(--rule); }
  .unread-mark { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-left: auto; }
  .card.read .unread-mark { display: none; }
  .card-subject { font-family: var(--serif); font-size: clamp(19px, 2.4vw, 22px); line-height: 1.35; margin-bottom: 10px; letter-spacing: -0.005em; transition: color 0.15s; }
  .card-preview { font-size: 14px; line-height: 1.65; color: var(--ink-soft); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .reader { position: fixed; inset: 0; background: var(--bg); z-index: 100; overflow-y: auto; padding: 24px 20px 60px; animation: fadeIn 0.2s; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .reader-inner { max-width: 680px; margin: 0 auto; }
  .reader-close { background: transparent; border: 1px solid var(--rule); color: var(--ink-soft); font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; padding: 8px 14px; border-radius: 999px; cursor: pointer; margin-bottom: 28px; }
  .reader-close:hover { color: var(--ink); border-color: var(--ink-soft); }
  .reader-meta { margin-bottom: 14px; font-size: 12px; color: var(--ink-muted); display: flex; align-items: center; gap: 10px; }
  .reader-subject { font-family: var(--serif); font-size: clamp(26px, 4vw, 36px); line-height: 1.25; margin-bottom: 28px; letter-spacing: -0.01em; }
  .reader-body { font-size: 15.5px; line-height: 1.8; white-space: pre-wrap; word-wrap: break-word; }
  .reader-body a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
  .reader-actions { margin-top: 36px; padding-top: 24px; border-top: 1px solid var(--rule); display: flex; gap: 10px; }
  .reader-actions button { background: transparent; border: 1px solid var(--rule); color: var(--ink-soft); font-size: 13px; padding: 9px 16px; border-radius: 6px; cursor: pointer; }
  .reader-actions button:hover { color: var(--ink); border-color: var(--ink-soft); }
  .state { text-align: center; padding: 80px 20px; color: var(--ink-muted); font-family: var(--serif); font-size: 17px; font-style: italic; }
  .state-sub { margin-top: 12px; font-family: var(--sans); font-size: 13px; font-style: normal; }
  .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--rule); border-top-color: var(--ink); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  footer { margin-top: 60px; padding-top: 24px; border-top: 1px solid var(--rule); text-align: center; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-muted); }
  @media (max-width: 480px) { body { padding: 16px 16px 60px; } .stats { gap: 16px; } .stat-value { font-size: 24px; } .card { padding: 18px 0; } }
  body, .card-subject, .reader-subject { word-break: keep-all; overflow-wrap: break-word; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="masthead"><span>오늘의 뉴스레터</span><span><button id="print-btn" style="background:transparent;border:none;color:var(--ink-muted);font-size:11px;letter-spacing:0.18em;cursor:pointer;text-transform:uppercase;font-family:inherit;padding:4px 8px;margin-right:14px;">📄 인쇄</button><span id="today-display"></span></span></div>
    <div class="date-block">
      <div class="date-num" id="date-num"></div>
      <div class="date-meta"><span id="date-full"></span><span>·</span><span id="date-weekday"></span></div>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-label">전체</div><div class="stat-value" id="stat-total">—</div></div>
      <div class="stat"><div class="stat-label">안 읽음</div><div class="stat-value" id="stat-unread">—</div></div>
      <div class="stat"><div class="stat-label">오늘 도착</div><div class="stat-value" id="stat-today">—</div></div>
    </div>
  </header>
  <div class="filters" id="filters"></div>
  <main id="content"><div class="state"><div class="loading"></div><div class="state-sub" style="margin-top: 16px;">뉴스레터를 불러오는 중…</div></div></main>
  <footer>Curated for you · Updated every 30 minutes</footer>
</div>
<div id="reader-mount"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://scckrdxdokgnacyfmtjn.supabase.co';
const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_HbMfrg-jRAhbH6tTX9ZlzA_lLgRgvpk';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);
let newsletters = [], issues = [], filter = { newsletter: 'all', readStatus: 'all' };
function getReadIds() { try { return new Set(JSON.parse(localStorage.getItem('readIds') || '[]')); } catch { return new Set(); } }
function setRead(id) { const s = getReadIds(); s.add(id); localStorage.setItem('readIds', JSON.stringify([...s])); }
const WEEKDAYS = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
function formatHeader() {
  const now = new Date();
  document.getElementById('date-num').textContent = now.getDate();
  document.getElementById('date-full').textContent = `${now.getFullYear()}년 ${now.getMonth()+1}월`;
  document.getElementById('date-weekday').innerHTML = `<strong>${WEEKDAYS[now.getDay()]}</strong>`;
  document.getElementById('today-display').textContent = `${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
}
function dateLabel(dateStr) {
  const d = new Date(dateStr), today = new Date(), yesterday = new Date(today);
  yesterday.setDate(today.getDate() - 1);
  const sameDay = (a, b) => a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
  if (sameDay(d, today)) return '오늘';
  if (sameDay(d, yesterday)) return '어제';
  return `${d.getMonth()+1}월 ${d.getDate()}일 ${WEEKDAYS[d.getDay()].slice(0,1)}요일`;
}
function timeLabel(dateStr) {
  const d = new Date(dateStr); const h = d.getHours(), m = d.getMinutes();
  return `${h<12?'오전':'오후'} ${h%12||12}:${String(m).padStart(2,'0')}`;
}
function dateKey(dateStr) { const d = new Date(dateStr); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; }
function cleanPreview(text) { if (!text) return ''; return text.replace(/\r/g,'').replace(/\n{3,}/g,'\n\n').replace(/[ \t]+/g,' ').replace(/[ \t]+\n/g,'\n').trim().slice(0, 280); }
function cleanBody(text, html) {
  let result;
  if (html) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    doc.querySelectorAll('script, style, head, meta, link, title, img, button, input, form, [width="1"], [height="1"]').forEach(el => el.remove());
    // Stibee 추적 링크 제거: 링크 텍스트 자체가 URL인 <a> 태그 통째로 삭제
    doc.querySelectorAll('a').forEach(a => {
      const txt = (a.textContent || '').trim();
      if (/^\[?\s*https?:\/\//.test(txt)) a.remove();
    });
    doc.querySelectorAll('p, div, h1, h2, h3, h4, h5, h6, li, tr').forEach(el => el.insertAdjacentText('beforeend', '\n'));
    doc.querySelectorAll('br, hr').forEach(el => el.replaceWith(document.createTextNode('\n')));
    result = doc.body.textContent || '';
  } else if (text) {
    result = text;
  } else {
    return '내용을 표시할 수 없어요.';
  }
  return result
    .replace(/\r/g, '')
    .replace(/\[\s*https?:\/\/[^\]]+\]/g, '')
    .replace(/https?:\/\/\S+/g, '')
    .replace(/\u00A0/g, ' ')
    .replace(/[ \t]+/g, ' ')
    .replace(/[ \t]+\n/g, '\n')
    .replace(/\n{3,}/g, '\n\n')
    .trim();
}
  async function load() {
  try {
    const [{ data: nls, error: e1 }, { data: iss, error: e2 }] = await Promise.all([
      sb.from('newsletters').select('*').eq('is_active', true).order('name'),
      sb.from('issues').select('id, newsletter_id, subject, body_text, body_html, received_at').order('received_at', { ascending: false }).limit(200)
    ]);
    if (e1 || e2) throw (e1 || e2);
    newsletters = nls || [];
    issues = (iss || []).map(i => ({ ...i, newsletter: newsletters.find(n => n.id === i.newsletter_id), is_read: getReadIds().has(i.id) }));
    renderFilters(); render(); updateStats();
  } catch (err) {
    console.error(err);
    document.getElementById('content').innerHTML = `<div class="state">연결에 문제가 있어요.<div class="state-sub">콘솔(F12)에서 에러 확인하거나 URL/Key 설정을 다시 봐주세요.</div></div>`;
  }
}
function updateStats() {
  const readIds = getReadIds(), todayKey = dateKey(new Date());
  document.getElementById('stat-total').textContent = issues.length;
  document.getElementById('stat-unread').textContent = issues.filter(i => !readIds.has(i.id)).length;
  document.getElementById('stat-today').textContent = issues.filter(i => dateKey(i.received_at) === todayKey).length;
}
function renderFilters() {
  const readIds = getReadIds(), filtersEl = document.getElementById('filters');
  const pills = [
    { id: 'all', label: '전체', count: issues.length, type: 'newsletter' },
    { id: 'unread', label: '안 읽음', count: issues.filter(i => !readIds.has(i.id)).length, type: 'readStatus' },
  ];
  for (const n of newsletters) {
    const count = issues.filter(i => i.newsletter_id === n.id).length;
    if (count === 0) continue;
    pills.push({ id: n.id, label: n.name, count, color: n.color, type: 'newsletter' });
  }
  filtersEl.innerHTML = pills.map(p => {
    const active = (p.type === 'newsletter' && filter.newsletter === p.id) || (p.type === 'readStatus' && p.id === 'unread' && filter.readStatus === 'unread');
    const dot = p.color ? `<span class="pill-dot" style="background:${p.color}"></span>` : '';
    return `<button class="pill ${active ? 'active' : ''}" data-type="${p.type}" data-id="${p.id}">${dot}${p.label} <span style="opacity:.6">${p.count}</span></button>`;
  }).join('');
  filtersEl.querySelectorAll('.pill').forEach(el => {
    el.addEventListener('click', () => {
      const { type, id } = el.dataset;
      if (type === 'readStatus') filter.readStatus = (filter.readStatus === 'unread') ? 'all' : 'unread';
      else filter.newsletter = id;
      renderFilters(); render();
    });
  });
}
function render() {
  const readIds = getReadIds();
  let list = issues.map(i => ({...i, is_read: readIds.has(i.id)}));
  if (filter.newsletter !== 'all') list = list.filter(i => i.newsletter_id === filter.newsletter);
  if (filter.readStatus === 'unread') list = list.filter(i => !i.is_read);
  if (list.length === 0) {
    document.getElementById('content').innerHTML = `<div class="state">오늘은 조용하네요.<div class="state-sub">새 메일이 도착하면 30분 안에 여기 나타나요.</div></div>`;
    return;
  }
  const groups = new Map();
  for (const i of list) {
    const k = dateKey(i.received_at);
    if (!groups.has(k)) groups.set(k, { label: dateLabel(i.received_at), items: [] });
    groups.get(k).items.push(i);
  }
  let html = '';
  for (const [, group] of groups) {
    html += `<section class="date-section"><div class="date-divider"><span class="date-divider-text">${group.label}</span><span class="date-divider-line"></span></div>`;
    for (const i of group.items) {
      html += `<article class="card ${i.is_read ? 'read' : ''}" data-id="${i.id}">
        <div class="card-meta">
          <span class="nl-badge"><span class="nl-dot" style="background:${i.newsletter?.color || '#888'}"></span>${i.newsletter?.name || '알 수 없음'}</span>
          <span class="meta-sep">·</span><span>${timeLabel(i.received_at)}</span><span class="unread-mark"></span>
        </div>
        <h2 class="card-subject">${escapeHtml(i.subject)}</h2>
        <p class="card-preview">${escapeHtml(cleanPreview(i.body_text))}</p>
      </article>`;
    }
    html += `</section>`;
  }
  document.getElementById('content').innerHTML = html;
  document.querySelectorAll('.card').forEach(el => { el.addEventListener('click', () => openReader(el.dataset.id)); });
}
function openReader(id) {
  const issue = issues.find(i => i.id === id);
  if (!issue) return;
  setRead(id);
  const mount = document.getElementById('reader-mount');

  const hasHtml = !!issue.body_html;
  const bodyMarkup = hasHtml
    ? `<iframe id="content-frame" sandbox="allow-same-origin allow-popups allow-popups-to-escape-sandbox" style="width:100%; border:none; min-height:600px; background:white; border-radius:8px;"></iframe>`
    : `<div class="reader-body">${escapeHtml(cleanBody(issue.body_text, issue.body_html))}</div>`;

  mount.innerHTML = `<div class="reader" id="reader"><div class="reader-inner">
    <button class="reader-close" id="reader-close">← 닫기</button>
    <div class="reader-meta"><span class="nl-badge"><span class="nl-dot" style="background:${issue.newsletter?.color || '#888'}"></span>${issue.newsletter?.name || ''}</span><span class="meta-sep">·</span><span>${dateLabel(issue.received_at)} ${timeLabel(issue.received_at)}</span></div>
    <h1 class="reader-subject">${escapeHtml(issue.subject)}</h1>
    ${bodyMarkup}
  </div></div>`;

  if (hasHtml) {
    const iframe = document.getElementById('content-frame');
    iframe.srcdoc = issue.body_html;
    const resize = () => { try { iframe.style.height = (iframe.contentDocument.body.scrollHeight + 40) + 'px'; } catch(e) {} };
    iframe.onload = () => { resize(); setTimeout(resize, 500); setTimeout(resize, 1500); };
  }

  document.body.style.overflow = 'hidden';
  document.getElementById('reader-close').onclick = closeReader;
  document.addEventListener('keydown', escClose);
  render(); updateStats(); renderFilters();
}
function closeReader() { document.getElementById('reader-mount').innerHTML = ''; document.body.style.overflow = ''; document.removeEventListener('keydown', escClose); }
function escClose(e) { if (e.key === 'Escape') closeReader(); }
function openPrintPicker() {
  const datesWithCount = {};
  issues.forEach(i => { const k = dateKey(i.received_at); datesWithCount[k] = (datesWithCount[k] || 0) + 1; });
  const datesSorted = Object.keys(datesWithCount).sort((a, b) => {
    const da = a.split('-').map(Number), db = b.split('-').map(Number);
    return new Date(db[0], db[1]-1, db[2]) - new Date(da[0], da[1]-1, da[2]);
  });
  if (datesSorted.length === 0) { alert('인쇄할 메일이 없습니다.'); return; }

  const todayK = dateKey(new Date());
  const yesterdayK = (() => { const d = new Date(); d.setDate(d.getDate()-1); return dateKey(d); })();
  const todayISO = (() => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })();

  const quickHtml = datesSorted.slice(0, 7).map(d => {
    const count = datesWithCount[d];
    const [y, m, day] = d.split('-').map(Number);
    let label = (d === todayK) ? '오늘' : (d === yesterdayK) ? '어제' : `${m}월 ${day}일`;
    return `<button class="quick-date" data-datekey="${d}" style="padding:6px 12px;background:transparent;border:1px solid var(--rule);color:var(--ink-soft);border-radius:999px;cursor:pointer;font-family:inherit;font-size:12px;display:inline-flex;align-items:center;gap:6px;">${label} <span style="opacity:0.5;">${count}</span></button>`;
  }).join('');

  const fmtBtn = (val, name, desc, active) => `<button class="fmt-pill" data-fmt="${val}" style="flex:1;padding:8px 6px;background:${active?'var(--ink)':'transparent'};color:${active?'var(--bg)':'var(--ink-soft)'};border:1px solid ${active?'var(--ink)':'var(--rule)'};border-radius:6px;cursor:pointer;font-family:inherit;font-size:12px;display:flex;flex-direction:column;gap:2px;align-items:center;"><strong>${name}</strong><span style="font-size:10px;opacity:0.7;">${desc}</span></button>`;

  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;';
  modal.innerHTML = `<div style="background:var(--bg);border:1px solid var(--rule);border-radius:12px;padding:24px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3);font-family:var(--sans);"><h3 style="font-family:var(--serif);font-size:22px;margin:0 0 6px;color:var(--ink);font-weight:400;">인쇄</h3><p style="font-size:13px;color:var(--ink-soft);margin:0 0 18px;line-height:1.5;">선택한 날짜의 메일을 모아서 인쇄해요</p><div style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:8px;font-weight:500;">날짜</div><div style="margin-bottom:10px;"><input type="date" id="date-picker-input" value="${todayISO}" style="width:100%;padding:9px 12px;border:1px solid var(--rule);border-radius:6px;background:var(--bg);color:var(--ink);font-size:14px;font-family:inherit;color-scheme:light dark;" /></div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;">${quickHtml}</div><div style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:8px;font-weight:500;">인쇄 형식</div><div id="fmt-row" style="display:flex;gap:6px;margin-bottom:22px;">${fmtBtn('normal','일반','보기 좋게',true)}${fmtBtn('compact','컴팩트','글씨 작게',false)}${fmtBtn('dense','2단','종이 절반',false)}${fmtBtn('headlines','제목만','목차만',false)}${fmtBtn('headlines','제목만','목차만',false)}${fmtBtn('extreme','극압축','종이 1/4',false)}</div><div style="display:flex;gap:8px;justify-content:flex-end;"><button id="cancel-print" style="padding:10px 18px;background:transparent;border:1px solid var(--rule);color:var(--ink-soft);border-radius:6px;cursor:pointer;font-family:inherit;font-size:13px;">취소</button><button id="confirm-print" style="padding:10px 18px;background:var(--ink);color:var(--bg);border:none;border-radius:6px;cursor:pointer;font-family:inherit;font-size:13px;">📄 인쇄</button></div></div>`;
  document.body.appendChild(modal);

  let selectedFmt = 'normal';
  modal.querySelectorAll('.quick-date').forEach(btn => {
    btn.onclick = () => {
      const dk = btn.dataset.datekey;
      const [y, m, day] = dk.split('-').map(Number);
      modal.querySelector('#date-picker-input').value = `${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    };
  });
  modal.querySelectorAll('.fmt-pill').forEach(btn => {
    btn.onclick = () => {
      selectedFmt = btn.dataset.fmt;
      modal.querySelectorAll('.fmt-pill').forEach(b => {
        const active = (b === btn);
        b.style.background = active ? 'var(--ink)' : 'transparent';
        b.style.color = active ? 'var(--bg)' : 'var(--ink-soft)';
        b.style.borderColor = active ? 'var(--ink)' : 'var(--rule)';
      });
    };
  });
  modal.querySelector('#cancel-print').onclick = () => modal.remove();
  modal.querySelector('#confirm-print').onclick = () => {
    const iso = modal.querySelector('#date-picker-input').value;
    if (!iso) return;
    const [y, m, day] = iso.split('-').map(Number);
    modal.remove();
    printDate(`${y}-${m}-${day}`, selectedFmt);
  };
  modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
}
function printDate(targetDateKey, format = 'normal') {
  const dayIssues = issues.filter(i => dateKey(i.received_at) === targetDateKey).sort((a, b) => new Date(a.received_at) - new Date(b.received_at));
  if (dayIssues.length === 0) { alert('그 날짜에 도착한 메일이 없습니다.'); return; }
  const w = window.open('', '_blank', 'width=900,height=1200');
  if (!w) { alert('팝업이 차단됐어요. 브라우저 팝업을 허용해주세요.'); return; }
  const [y, m, day] = targetDateKey.split('-').map(Number);
  const targetDate = new Date(y, m-1, day);
  const dateStr = `${y}년 ${m}월 ${day}일 ${WEEKDAYS[targetDate.getDay()]}`;

  const fmt = {
    normal:    { fs:14, ss:22, pad:'24px',     mg:'24px', pgM:'18mm', cols:'', showBody:true,  lh:1.7,  landscape:false, mw:'800px', useText:false, maxLength:0 },
    compact:   { fs:11, ss:15, pad:'14px 16px',mg:'12px', pgM:'12mm', cols:'', showBody:true,  lh:1.55, landscape:false, mw:'800px', useText:false, maxLength:0 },
    dense:     { fs:10, ss:13, pad:'10px 12px',mg:'8px',  pgM:'10mm', cols:'column-count:2;column-gap:14px;', showBody:true, lh:1.5, landscape:false, mw:'800px', useText:true, maxLength:2500 },
    headlines: { fs:12, ss:14, pad:'8px 14px', mg:'4px',  pgM:'14mm', cols:'', showBody:false, lh:1.5,  landscape:false, mw:'800px', useText:false, maxLength:0 },
    extreme:   { fs:9,  ss:11, pad:'0',        mg:'10px', pgM:'5mm',  cols:'column-count:4;column-gap:10px;column-fill:auto;', showBody:true, lh:1.55, landscape:true, mw:'100%', flat:true, useText:true, maxLength:1200 }
  }[format] || {};

  const sections = dayIssues.map(issue => {
    const time = timeLabel(issue.received_at);
    if (!fmt.showBody) {
      return `<article class="newsletter"><div class="hl-row"><span class="nl-dot" style="background:${issue.newsletter?.color || '#888'}"></span><span class="nl-name">${escapeHtml(issue.newsletter?.name || '')}</span><span class="nl-time">${time}</span><h2 class="nl-subject">${escapeHtml(issue.subject)}</h2></div></article>`;
    }
    let bodyContent;
    if (fmt.useText) {
      let text = cleanBody(issue.body_text, issue.body_html);
      if (fmt.maxLength && text.length > fmt.maxLength) {
        text = text.slice(0, fmt.maxLength) + '\n\n… (전체 내용은 대시보드에서)';
      }
      bodyContent = '<div class="nl-text">' + escapeHtml(text) + '</div>';
    } else {
      bodyContent = issue.body_html || '<pre>' + escapeHtml(issue.body_text || '') + '</pre>';
    }
    return `<article class="newsletter"><header class="nl-header"><div class="nl-source"><span class="nl-dot" style="background:${issue.newsletter?.color || '#888'}"></span><span class="nl-name">${escapeHtml(issue.newsletter?.name || '')}</span><span class="nl-time">${time}</span></div><h2 class="nl-subject">${escapeHtml(issue.subject)}</h2></header><div class="nl-body">${bodyContent}</div></article>`;
  }).join('');

  const headlineCss = !fmt.showBody ? `.newsletter { padding: ${fmt.pad}; margin: 0 0 ${fmt.mg} 0; background: white; border: none; border-bottom: 1px solid #e5e5e5; border-radius: 0; } .hl-row { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; } .hl-row .nl-subject { font-size: ${fmt.ss}px; margin: 0; flex: 1; min-width: 200px; }` : '';

  w.document.write(`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>뉴스레터 모음 - ${dateStr}</title><style>@page { size: A4 ${fmt.landscape ? 'landscape' : 'portrait'}; margin: ${fmt.pgM}; } * { box-sizing: border-box; } body { font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; color: #1f1b17; line-height: ${fmt.lh}; margin: 0 auto; padding: 20px; max-width: ${fmt.mw}; background: #f7f4ed; font-size: ${fmt.fs}px; } .doc-header { border-bottom: 2px solid #1f1b17; padding-bottom: 14px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: baseline; } .doc-title { font-size: 22px; font-weight: 700; } .doc-meta { color: #888; font-size: 12px; } .print-controls { position: fixed; top: 20px; right: 20px; z-index: 99; } .print-btn { padding: 10px 24px; background: #1f1b17; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-family: inherit; } .doc-content { ${fmt.cols} } .newsletter { margin-bottom: ${fmt.mg}; ${fmt.flat ? 'padding: 0 0 8px 0; border: none; border-bottom: 0.5px solid #ccc; border-radius: 0; background: transparent;' : 'page-break-inside: avoid; break-inside: avoid; background: white; padding: ' + fmt.pad + '; border-radius: 6px; border: 1px solid #ddd;'} } .nl-header { margin-bottom: 10px; padding-bottom: 8px; border-bottom: 0.5px solid #eee; } .nl-source { display: flex; align-items: center; gap: 6px; font-size: 10px; color: #666; margin-bottom: 4px; } .nl-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; } .nl-name { font-weight: 600; color: #1f1b17; } .nl-time { color: #888; } .nl-subject { font-size: ${fmt.ss}px; font-weight: 600; line-height: 1.3; margin: 0; } .nl-body { font-size: ${fmt.fs}px; word-break: keep-all; overflow-wrap: anywhere; overflow: hidden; } .nl-body * { max-width: 100% !important; box-sizing: border-box !important; } .nl-body td, .nl-body th { word-break: keep-all !important; overflow-wrap: anywhere !important; padding: 4px !important; } .nl-body table { table-layout: fixed !important; width: 100% !important; } .nl-body p, .nl-body div { margin: 0 0 0.5em 0; } .nl-body img { max-width: 100%; height: auto; } .nl-body pre { white-space: pre-wrap; word-wrap: break-word; font-family: inherit; font-size: ${fmt.fs}px; } .nl-text { white-space: pre-wrap; word-break: keep-all; overflow-wrap: anywhere; font-family: inherit; font-size: ${fmt.fs}px; line-height: ${fmt.lh}; } ${headlineCss} @media print { .print-controls { display: none; } body { max-width: none; padding: 0; background: white; } .newsletter { background: white; box-shadow: none; } }</style></head><body><div class="print-controls"><button class="print-btn" onclick="window.print()">🖨️ 인쇄하기</button></div><div class="doc-header"><div><div class="doc-title">뉴스레터 모음</div><div class="doc-meta">${dateStr} · 총 ${dayIssues.length}통</div></div></div><div class="doc-content">${sections}</div></body></html>`);
  w.document.close();
}
  function escapeHtml(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
function linkify(text) { return text.replace(/(https?:\/\/[^\s<]+)/g, url => `<a href="${url}" target="_blank" rel="noopener">${url}</a>`); }
formatHeader(); load();
document.getElementById('print-btn').addEventListener('click', openPrintPicker);
setInterval(load, 5 * 60 * 1000);
</script>
